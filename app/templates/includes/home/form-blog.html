<h4 class="comment-title">Veuillez laisser votre commentaire</h4>
<form class="comment-form">
    <div class="row">
        <div class="col-sm-6">
            <input type="text" placeholder="Votre Nom">
        </div>
        <div class="col-sm-6">
            <input type="email" placeholder="Votre Email">
        </div>
        <div class="col-sm-12">
            <textarea placeholder="Votre Message"></textarea>
            <button class="site-btn">ENVOYER LE COMMENTAIRE</button>
        </div>
    </div>
</form>
